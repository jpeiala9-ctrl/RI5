      const Utils = {
        parseTime(t) { 
          try {
            t = t.trim(); 
            if (!t) return NaN; 
            const m = t.match(/^(\d{1,3}):?(\d{0,2})$/); 
            if (!m) return NaN; 
            const min = parseInt(m[1]), seg = m[2] ? parseInt(m[2]) : 0; 
            if (seg > 59 || min > 120 || min < 10) return NaN; 
            return min + seg / 60; 
          } catch (e) { return NaN; }
        },
        
        formatR(r) { 
          try {
            if (!isFinite(r) || r <= 0) return "--:--"; 
            let m = Math.floor(r), s = Math.round((r - m) * 60); 
            if (s === 60) { m++; s = 0; } 
            return m + ":" + (s < 10 ? '0' : '') + s; 
          } catch (e) { return "--:--"; }
        },
        
        showToast(message, type = 'info', duration = 3000) {
          try {
            let container = document.getElementById('toast-container');
            if (!container) {
              container = document.createElement('div');
              container.id = 'toast-container';
              document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toast.onclick = () => toast.remove();
            container.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
          } catch (e) { alert(message); }
        },
        
        confirm(title, message) {
          return new Promise((resolve) => {
            try {
              const overlay = document.getElementById('confirmOverlay');
              const modal = document.getElementById('confirmModal');
              const titleEl = document.getElementById('confirmTitle');
              const msgEl = document.getElementById('confirmMessage');
              const yesBtn = document.getElementById('confirmYes');
              const noBtn = document.getElementById('confirmNo');

              if (!overlay || !modal) {
                resolve(confirm(message));
                return;
              }

              titleEl.textContent = title;
              msgEl.textContent = message;
              overlay.classList.add('active');
              modal.classList.add('active');

              const onYes = () => {
                overlay.classList.remove('active');
                modal.classList.remove('active');
                yesBtn.removeEventListener('click', onYes);
                noBtn.removeEventListener('click', onNo);
                resolve(true);
              };
              const onNo = () => {
                overlay.classList.remove('active');
                modal.classList.remove('active');
                yesBtn.removeEventListener('click', onYes);
                noBtn.removeEventListener('click', onNo);
                resolve(false);
              };

              yesBtn.addEventListener('click', onYes);
              noBtn.addEventListener('click', onNo);
            } catch (e) {
              resolve(confirm(message));
            }
          });
        },
        
        isValidEmail(email) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

        vibrate(pattern) {
          if (window.navigator && window.navigator.vibrate) {
            try { window.navigator.vibrate(pattern); } catch (e) {}
          }
        },
        
        playSound(type) {
          if (!window.audioEnabled) return;
          try {
            if (!window.audioContext) {
              window.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            const osc = window.audioContext.createOscillator();
            const gainNode = window.audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = type === 'success' ? 800 : 400;
            gainNode.gain.value = 0.1;
            gainNode.gain.exponentialRampToValueAtTime(0.00001, window.audioContext.currentTime + 0.5);
            osc.connect(gainNode);
            gainNode.connect(window.audioContext.destination);
            osc.start();
            osc.stop(window.audioContext.currentTime + 0.2);
          } catch (e) {}
        },
        
        debounce(func, wait) {
          let timeout;
          return function executedFunction(...args) {
            const later = () => {
              clearTimeout(timeout);
              func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
          };
        }
      };

        async _getCached(key, fetcher) {
          const now = Date.now();
          if (this._cache[key] && (now - (this._cacheTime[key] || 0)) < this.CACHE_TTL) {
            return this._cache[key];
          }
          const value = await fetcher();
          this._cache[key] = value;
          this._cacheTime[key] = now;
          return value;
        },

        _invalidateCache(key) {
          delete this._cache[key];
          delete this._cacheTime[key];
        },

          const messageSpan = document.getElementById('expiry-message');
          
          if (!banner || !messageSpan) return;

          if (!this.isPremium || !this.premiumExpiryDate) {
            banner.style.display = 'none';
            return;
          }

          const ahora = new Date();
          const expiry = new Date(this.premiumExpiryDate);
          const diasRestantes = Math.ceil((expiry - ahora) / (1000 * 60 * 60 * 24));

          if (diasRestantes <= 7 && diasRestantes > 0) {
            banner.style.display = 'block';
            messageSpan.innerText = `⚠️ Tu premium expira en ${diasRestantes} día${diasRestantes !== 1 ? 's' : ''}. Renueva.`;
          } else if (diasRestantes <= 0) {
            banner.style.display = 'block';
            messageSpan.innerText = `⚠️ Tu premium ha expirado. Renueva.`;
          } else {
            banner.style.display = 'none';
          }

        async loginUser() {
          const u = document.getElementById('loginUsername')?.value.trim() || '';
          const p = document.getElementById('loginPassword')?.value.trim() || '';
          const err = document.getElementById('loginError');
          
          if (!err) return;
          
          // Limpiar error anterior
          err.classList.remove('visible');
          
          // Validación básica
          if (!u || !p) { 
            err.innerText = "> INTRODUCE USUARIO Y CONTRASEÑA_"; 
            err.classList.add('visible'); 
            return; 
          }
          
          try {
            // Determinar si es email o usuario
            let email = u;
            let userData = null;
            let userUid = null;
            
            if (u.includes('@')) {
              // Es email, buscar por email
              const users = await Storage.getUsers();
              const entry = Object.entries(users).find(([uid, data]) => data.email === u);
              if (entry) {
                userUid = entry[0];
                userData = entry[1];
              } else {
                throw new Error('Usuario no encontrado');
              }
            } else {
              // Es nombre de usuario
              const users = await Storage.getUsers();
              const entry = Object.entries(users).find(([uid, data]) => data.username === u);
              if (!entry) throw new Error('Usuario no encontrado');
              userUid = entry[0];
              userData = entry[1];
              email = userData.email;
            }
            
            // Verificar contraseña (contra la DB local primero, por rapidez)
            if (userData.password !== btoa(p + "_RI5_SALT")) {
              err.innerText = "> CONTRASEÑA INCORRECTA_";
              err.classList.add('visible');
              return;
            }
            
            // Autenticar con Firebase Auth
            try {
              await auth.signInWithEmailAndPassword(email, p);
            } catch (authError) {
              console.warn('Error en Firebase Auth:', authError);
              // Si falla Auth pero la contraseña local es correcta, continuamos
            }
            
            // Verificar expiración
            const now = new Date();
            const expiry = new Date(userData.expires);
            if (now > expiry && !userData.premium) {
              err.innerText = "> ACCESO EXPIRADO_";
              err.classList.add('visible');
              return;
            }
            
            // Actualizar contadores mensuales
            const ahora = new Date();
            const mesActual = `${ahora.getFullYear()}-${ahora.getMonth() + 1}`;
            let calculosMes = userData.calculosMes || 0;
            let mesActualUsuario = userData.mesActual || '';
            
            if (mesActualUsuario !== mesActual) {
              calculosMes = 0;
              mesActualUsuario = mesActual;
              userData.calculosMes = 0;
              userData.mesActual = mesActual;
              await Storage.updateUser(userUid, { calculosMes: 0, mesActual: mesActual });
            }
            
            // Establecer usuario en el estado global
            AppState.setCurrentUser(userUid, userData);
            
            // Cargar mensajes

            AppState.mensajesNoLeidos = msgs.filter(m => !m.leido).length;
            if (UI && typeof UI.actualizarBadgeMensajes === 'function') {
              UI.actualizarBadgeMensajes();

            Utils.showToast(`✅ Bienvenido, ${userData.username}`, 'success');
            
            // Entrar a la aplicación
            document.getElementById("loginPage").style.opacity = "0";
            setTimeout(() => {

              if (UI && typeof UI.changeDailyTip === 'function') UI.changeDailyTip();

        renderizarListaUsuarios(users, container, filtro = '', tipoFiltro = 'total') {

          const items = Object.entries(users)
            .filter(([uid, d]) => (d.username || uid).toLowerCase().includes(filtro.toLowerCase()))
            .filter(([uid, d]) => {
              if (tipoFiltro === 'activos') return new Date(d.expires) > ahora;
              if (tipoFiltro === 'expirados') return new Date(d.expires) <= ahora;
              if (tipoFiltro === 'premium') return d.premium === true;
              return true;
            })
            .map(([uid, d]) => {
              const creado = new Date(d.created).toLocaleDateString();
              const expiry = new Date(d.expires).toLocaleDateString();
              const premium = d.premium ? '✅ PREMIUM' : '❌ NO PREMIUM';
              const estado = new Date(d.expires) > ahora ? '🟢 ACTIVO' : '🔴 EXPIRADO';
              const calculos = d.calculosMes || 0;
              const pendiente = d.adminNotified === false ? ' (🆕 Pendiente)' : '';
              
              return `
                <div class="usuario-item" onclick="window.toggleUsuario(this)">

        async eliminarUsuario(u) {
          const confirmed = await Utils.confirm('ELIMINAR USUARIO', `> ¿ELIMINAR "${u}"?`);
          if (!confirmed) return;
          
          try {
            const users = await Storage.getUsers();
            
            // Buscar el UID correspondiente al nombre de usuario
            const entries = Object.entries(users);
            const userEntry = entries.find(([uid, data]) => data.username === u);
            
            if (userEntry) {
              const uid = userEntry[0];
              delete users[uid];
              await Storage.saveUsers(users);
              
              // También eliminar datos relacionados
              await db.ref('historial/' + uid).remove();
              await db.ref('planesCompletos/' + uid).remove();
              await db.ref('sesionesRealizadas/' + uid).remove();
              await db.ref('mensajes/' + uid).remove();
              await db.ref('mensajes/admin_' + uid).remove();
            } else {
              // Fallback al método antiguo
              delete users[u];
              await Storage.saveUsers(users);
            }
            
            if (AppState.currentUserData?.username === u) {
              AppState.setCurrentUser(null, null);
            }
            
            this.actualizarAdminPanel(); 
            Utils.showToast(`✅ ${u} eliminado`, 'success'); 
            this.abrirModalUsuarios();
          } catch (error) {
            console.error('Error eliminando usuario:', error);
          }
        },
        
        exportarUsuariosCSV() { 
          Storage.getUsers().then(u => { 
            let csv = "Usuario,Creado,Expira,Premium,Estado,Cálculos Mes,Email,AdminNotified\n"; 
            Object.entries(u).forEach(([uid, d]) => {
              csv += `${d.username || uid},${new Date(d.created).toLocaleDateString()},${new Date(d.expires).toLocaleDateString()},${d.premium ? 'SI' : 'NO'},${new Date() <= new Date(d.expires) ? 'ACTIVO' : 'EXPIRADO'},${d.calculosMes || 0},${d.email || ''},${d.adminNotified ? 'SI' : 'NO'}\n`;
            }); 
            const b = new Blob([csv], { type: 'text/csv' }); 
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(b); 
            a.download = `usuarios_${new Date().toISOString().split('T')[0]}.csv`; 
            a.click(); 
            URL.revokeObjectURL(a.href); 
          }); 
        },

      const Training = {
        async startCalc() { 
          if (UI && typeof UI.validarTodo === 'function') UI.validarTodo(); 
          
          const calcBtn = document.getElementById("calcBtn");
          if (!calcBtn || calcBtn.disabled) return; 
          
          if (!AppState.isPremium) {
            const puedeCalcular = await AppState.incrementarCalculo();
            if (!puedeCalcular) return;
          }
          
          calcBtn.disabled = true;
          const originalText = calcBtn.textContent;
          calcBtn.textContent = 'CALCULANDO...';
          
          setTimeout(() => { 
            this.calculate(); 
            calcBtn.disabled = false;
            calcBtn.textContent = originalText;
            Utils.showToast("✓ CALCULADO", 'success'); 
            document.getElementById('results')?.scrollIntoView({ behavior: 'smooth' });
            Utils.vibrate(50);
            Utils.playSound('success');
          }, 300); 
        },
        
        calculate() {
          const n = AppState.currentUserData?.username || 'Runner';
          const a = parseInt(document.getElementById("age")?.value || '0');
          const t = Utils.parseTime(document.getElementById("time")?.value || '');
          
          if (!n || !a || isNaN(t)) { 
            Utils.showToast("> COMPLETA TODOS LOS CAMPOS CORRECTAMENTE_", 'error'); 
            return; 
          }
          
          const r = t / 6;
          const fc = 220 - a;
          const ul = Math.round(fc * 0.92 * 1.03);
          
          const pred = [
            { dist: 2, color: "var(--accent-blue)", ritmo: r * 0.98 },
            { dist: 6, color: "var(--accent-green)", ritmo: r },
            { dist: 10, color: "var(--accent-yellow)", ritmo: r * 1.05 },
            { dist: 21, color: "var(--accent-red)", ritmo: r * 1.12 },
            { dist: 42, color: "var(--accent-purple)", ritmo: r * 1.20 }
          ];
          
          const zones = [
            ["Z1", "RECUPERACIÓN", 0.75, 0.80, 1.35, "z1",
              "<p><strong>🎯 Ritmo:</strong> " + Utils.formatR(r * 1.35) + " min/km</p>" +
              "<p><strong>📍 Objetivo:</strong> Recuperación activa.</p>"],
            ["Z2", "BASE", 0.80, 0.90, 1.25, "z2",
              "<p><strong>🎯 Ritmo:</strong> " + Utils.formatR(r * 1.25) + " min/km</p>" +
              "<p><strong>📍 Objetivo:</strong> Resistencia aeróbica.</p>"],
            ["Z3", "TEMPO", 0.90, 0.95, 1.15, "z3",
              "<p><strong>🎯 Ritmo:</strong> " + Utils.formatR(r * 1.15) + " min/km</p>" +
              "<p><strong>📍 Objetivo:</strong> Elevar umbral.</p>"],
            ["Z4", "UMBRAL", 0.95, 1.02, 1.05, "z4",
              "<p><strong>🎯 Ritmo:</strong> " + Utils.formatR(r * 1.05) + " min/km</p>" +
              "<p><strong>📍 Objetivo:</strong> Tolerar lactato.</p>"],
            ["Z5", "VO₂MÁX", 1.02, 1.06, 0.95, "z5",
              "<p><strong>🎯 Ritmo:</strong> " + Utils.formatR(r * 0.95) + " min/km</p>" +
              "<p><strong>📍 Objetivo:</strong> Potencia aeróbica.</p>"],
            ["Z6", "VELOCIDAD", 1.06, 1.12, 0.85, "z6",
              "<p><strong>🎯 Ritmo:</strong> " + Utils.formatR(r * 0.85) + " min/km</p>" +
              "<p><strong>📍 Objetivo:</strong> Velocidad.</p>"]
          ];
          
          const calc = { name: n, age: a, fcMax: fc, ul: ul, zones: zones, pred: pred, ritmoBase: r };
          
          AppState.setLastCalc(calc); 
          if (UI && typeof UI.mostrarResultados === 'function') UI.mostrarResultados(calc); 
          
          const footer = document.getElementById("footer");
          if (footer) footer.innerText = `${n} · ${new Date().toLocaleDateString('es-ES')} · RI5`;
          
          this.guardarCalculoAutomatico(calc);
        },
        
        async guardarCalculoAutomatico(calc) {
          if (!AppState.currentUid) return;
          
          const ahora = new Date();
          let zonasResumen = calc.zones.map(z => { 
            const min = Math.round(calc.ul * z[2]); 
            const max = Math.round(calc.ul * z[3]); 
            return { zona: z[0], min, max }; 
          });
          
          const data = { 
            date: ahora.toLocaleDateString('es-ES'), 
            hora: ahora.toLocaleTimeString('es-ES'), 
            nombre: calc.name, 
            edad: calc.age, 
            fcMax: calc.fcMax, 
            umbral: calc.ul, 
            ritmo6k: Utils.formatR(calc.ritmoBase), 
            predicciones: calc.pred.map(p => `${p.dist}km:${Utils.formatR(p.ritmo)}`).join(' '), 
            resumen: `${calc.name} · ${calc.age} años · 6km: ${Utils.formatR(calc.ritmoBase)}`,

            err.classList.add('visible'); 
            el.classList.add('error');

        async guardarPlanEnHistorial(planParams, planCompleto) {
          if (!AppState.currentUid || !AppState.isPremium) return;
          
          const ahora = new Date();
          const planId = ahora.getTime().toString();
          const mapaDist = { "2k": "2 km", "5k": "5 km", "10k": "10 km", "medio": "MEDIA", "maraton": "MARATÓN" };
          const resumen = `${mapaDist[planParams.distancia]} · ${planParams.diasPorSemana} días · ${planParams.nivel}`;
          const detalle = `${planParams.modalidad === 'runner' ? 'Asfalto' : 'Montaña'} · ${planParams.objetivo} · Inicio: ${new Date(planParams.fechaInicio).toLocaleDateString()}`;
          
          const nuevoPlan = {
            id: planId,
            fecha: ahora.toISOString(),
            resumen: resumen,
            detalle: detalle,
            params: planParams
          };
          
          let historial = await Storage.getHistorialPlanes(AppState.currentUid);
          historial.unshift(nuevoPlan);
          
          if (historial.length > 3) {
            const eliminado = historial.pop();
            if (eliminado && eliminado.id) {
              await Storage.deletePlanCompleto(AppState.currentUid, eliminado.id);
            }
          }
          
          await Storage.saveHistorialPlanes(AppState.currentUid, historial);
          await Storage.savePlanCompleto(AppState.currentUid, planId, planCompleto);
          this.cargarHistorialPlanes();
        },
        
        async cargarPlanDesdeHistorial(planId) {
          if (!AppState.currentUid) return;
          
          try {
            const planCompleto = await Storage.getPlanCompleto(AppState.currentUid, planId);
            if (!planCompleto) {
              Utils.showToast('No se pudo cargar el plan', 'error');
              return;
            }
            
            AppState.planGeneradoActual = planCompleto.params;
            AppState.planActualId = planId;
            AppState.sesionesRealizadas = planCompleto.realizadas || {};
            AppState.trimestreActual = 0;
            
            const calendario = document.getElementById("calendarioEntreno");
            const cuestionario = document.getElementById("cuestionarioEntreno");
            if (calendario) calendario.style.display = "block";
            if (cuestionario) cuestionario.style.display = "none";
            
            this.mostrarCalendario(planCompleto.sesiones);
            const resumen = document.getElementById("resumenObjetivo");
            if (resumen) resumen.innerText = planCompleto.resumen;
            
            this.guardarEstado();
          } catch (e) {
            Utils.showToast('Error al cargar el plan', 'error');
          }
        },
        
        mostrarCalendario(sesiones) {
          const grid = document.getElementById("calendarioGrid");
          if (!grid) return;
          
          grid.innerHTML = "";
          
          const esAnual = sesiones.length > 7 * 12;
          const inicio = esAnual ? AppState.trimestreActual * 7 * 12 : 0;
          const fin = esAnual ? Math.min(inicio + 7 * 12, sesiones.length) : sesiones.length;
          const sesionesVisibles = sesiones.slice(inicio, fin);
          
          const fragment = document.createDocumentFragment();
          
          sesionesVisibles.forEach((sesion, idx) => {
            const diaGlobal = inicio + idx;
            const div = document.createElement("div");
            div.className = `calendario-dia ${sesion.color}`;
            
            if (AppState.sesionesRealizadas[diaGlobal]) {
              div.classList.add('realizado');
            }
            
            if (sesion.detalle) div.dataset.detalle = JSON.stringify(sesion.detalle);
            
            div.innerHTML = `<div style="font-size:10px;">S${sesion.semana}</div>
              <strong>${sesion.breve}</strong>
              ${sesion.detalle ? `<div style="font-size:8px;">${sesion.detalle.duracion}${sesion.detalle.unidad}</div>` : ''}`;
            
            div.dataset.letra = sesion.breve;
            div.dataset.semana = sesion.semana;
            div.dataset.colorClass = sesion.color;
            div.dataset.diaIndex = diaGlobal;
            div.onclick = function() {
              UI.mostrarDetalleSesion(this);
            };
            
            fragment.appendChild(div);
          });
          
          grid.appendChild(fragment);
          
          const nav = document.getElementById('calendarioNavegacion');
          if (nav) {
            if (esAnual) {
              nav.style.display = 'flex';
              const paginaEl = document.getElementById('calendarioPagina');
              if (paginaEl) paginaEl.innerText = `TRIMESTRE ${AppState.trimestreActual + 1}/4`;
              
              const anteriorBtn = document.getElementById('calendarioAnterior');
              if (anteriorBtn) anteriorBtn.disabled = AppState.trimestreActual === 0;
              
              const siguienteBtn = document.getElementById('calendarioSiguiente');
              if (siguienteBtn) siguienteBtn.disabled = AppState.trimestreActual === 3;
            } else {
              nav.style.display = 'none';
            }
          }
        },
        
        cambiarTrimestre(delta) {
          AppState.trimestreActual += delta;
          if (AppState.planActualId) {
            Storage.getPlanCompleto(AppState.currentUid, AppState.planActualId).then(plan => {
              if (plan) this.mostrarCalendario(plan.sesiones);
            });
          }
          this.guardarEstado();
        },

          if (!AppState.currentUid) return;
          
          const confirmed = await Utils.confirm('ELIMINAR PLAN', '¿Eliminar este plan del historial?');
          if (!confirmed) return;
          
          let historial = await Storage.getHistorialPlanes(AppState.currentUid);

              const msgs = await Storage.getMensajesUsuario(AppState.currentUid);

            } 
          }

          document.querySelectorAll('#tab-soporte .soporte-tab').forEach(t => t.classList.remove('active')); 
          document.querySelectorAll('#tab-soporte .soporte-panel').forEach(p => p.classList.remove('active'));

            document.querySelectorAll('#tab-soporte .soporte-tab')[0]?.classList.add('active');

          } else {

          const t = document.getElementById('soporteTabButton'); 
          if (t) {
            if (AppState.mensajesNoLeidos > 0) {
              t.classList.add('soporte-unread'); 
            } else {
              t.classList.remove('soporte-unread'); 
            }
          }

          const calendario = document.getElementById("calendarioEntreno");
          const cuestionario = document.getElementById("cuestionarioEntreno");
          
          if (calendario) calendario.style.display = "none"; 
          if (cuestionario) cuestionario.style.display = "block";
          
          AppState.planGeneradoActual = null;
          AppState.planActualId = null;
          AppState.sesionesRealizadas = {};
          
          this.guardarEstado();

        initDiasCheckboxes() { 
          const c = document.getElementById('diasSemanaContainer'); 
          if (!c) return;
          
          const dias = ['L', 'M', 'X', 'J', 'V', 'S', 'D']; 
          let h = ''; 
          
          for (let i = 0; i < 7; i++) { 
            const n = i + 1; 
            h += `<div class="dia-checkbox">
              <input type="checkbox" id="dia${n}" value="${n}" ${n === 4 || n === 6 ? 'checked' : ''}>
              <label for="dia${n}">${dias[i]}</label>
            </div>`; 
          } 
          
          c.innerHTML = h; 
        },
        
        setFechaActual() {
          const fechaInput = document.getElementById('fechaInicio');
          if (fechaInput) {
            const hoy = new Date();
            const año = hoy.getFullYear();
            const mes = String(hoy.getMonth() + 1).padStart(2, '0');
            const dia = String(hoy.getDate()).padStart(2, '0');
            fechaInput.value = `${año}-${mes}-${dia}`;
          }
        },

          const overlay = document.getElementById('welcomeOverlay');
          const modal = document.getElementById('welcomeModal');
          if (overlay) overlay.style.display = 'block';
          if (modal) modal.style.display = 'block';
        },
        
        guardarEstado() {
          if (!AppState.currentUid) return;
          
          const activeTab = document.querySelector('.tab-button.active')?.textContent.toLowerCase() || 'entreno';
          const calendario = document.getElementById('calendarioEntreno');
          
          const estado = {
            activeTab: activeTab,
            planVisible: calendario ? calendario.style.display === 'block' : false,
            planId: AppState.planActualId,
            trimestre: AppState.trimestreActual
          };
          
          sessionStorage.setItem('ri5_estado', JSON.stringify(estado));
        },
        
        restaurarEstado() {
          const estadoStr = sessionStorage.getItem('ri5_estado');
          if (!estadoStr) return;
          
          try {
            const estado = JSON.parse(estadoStr);
            
            if (estado.activeTab) {
              const tabMap = { 'entreno': 'entreno', 'plan': 'plan', 'historial': 'historial', 'soporte': 'soporte' };
              const tab = tabMap[estado.activeTab] || 'entreno';
              this.switchTab(tab);
            }
            
            if (estado.planVisible && estado.planId && AppState.currentUid) {
              AppState.trimestreActual = estado.trimestre || 0;
              this.cargarPlanDesdeHistorial(estado.planId);
            }
          } catch (e) {
            console.warn('Error restaurando estado', e);
          }
        },

          }
          if (!AppState.isPremium) {
            Utils.showToast("> SOLO USUARIOS PREMIUM PUEDEN CREAR PLANES_", 'error');

        async guardarPlanActual() { 
          if (!AppState.currentUid || !AppState.planGeneradoActual) return; 
          await Storage.setUltimoPlan(AppState.currentUid, AppState.planGeneradoActual); 
        },
        
        async mostrarUltimoPlanGuardado() { 
          if (!AppState.currentUid) { 
            Utils.showToast("> NO HAY USUARIO_", 'error'); 
            return; 
          }
          if (!AppState.isPremium) {
            Utils.showToast("> SOLO USUARIOS PREMIUM PUEDEN VER PLANES_", 'error');
            return;
          }
          
          const stored = await Storage.getUltimoPlan(AppState.currentUid); 
          if (!stored) { 
            Utils.showToast("> NO HAY PLAN GUARDADO_", 'error'); 
            return; 
          }
          
          AppState.ultimoPlanParams = stored; 
          
          const modalidad = document.getElementById("modalidad");
          if (modalidad) modalidad.value = stored.modalidad;
          
          const distObjetivo = document.getElementById("distObjetivo");
          if (distObjetivo) distObjetivo.value = stored.distancia;
          
          const duracionPlan = document.getElementById("duracionPlan");
          if (duracionPlan) duracionPlan.value = stored.macrociclo / 4;
          
          const diasGuardados = stored.diasEntreno || [4, 6]; 
          for (let i = 1; i <= 7; i++) { 
            const cb = document.getElementById(`dia${i}`); 
            if (cb) cb.checked = diasGuardados.includes(i); 
          }
          
          const nivel = document.getElementById("nivel");
          if (nivel) nivel.value = stored.nivel;
          
          const experiencia = document.getElementById("experienciaDistancia");
          if (experiencia) experiencia.value = stored.experiencia || "no";
          
          const objetivo = document.getElementById("objetivoPrincipal");
          if (objetivo) objetivo.value = stored.objetivo || "mejorar";
          
          const diaLargo = document.getElementById("diaLargo");
          if (diaLargo) diaLargo.value = stored.diaLargo;
          
          const fechaInicio = document.getElementById("fechaInicio");
          if (fechaInicio) fechaInicio.value = stored.fechaInicio || new Date().toISOString().split('T')[0];
          
          const cuestionario = document.getElementById("cuestionarioEntreno");
          if (cuestionario) cuestionario.style.display = "none";
          
          const calendario = document.getElementById("calendarioEntreno");
          if (calendario) calendario.style.display = "block";
          
          this.generarCalendarioEntreno(); 
        },
        
        async borrarPlanGuardado() { 
          if (!AppState.currentUid) return;
          
          const confirmed = await Utils.confirm('ELIMINAR PLAN', "> ¿ELIMINAR PLAN GUARDADO?_");
          if (!confirmed) return;
          
          await Storage.removeUltimoPlan(AppState.currentUid);
          
          const calendario = document.getElementById("calendarioEntreno");
          if (calendario) calendario.style.display = "none";
          
          const cuestionario = document.getElementById("cuestionarioEntreno");
          if (cuestionario) cuestionario.style.display = "block";
          
          AppState.planGeneradoActual = null;
          AppState.planActualId = null;
          AppState.sesionesRealizadas = {};
          
          Utils.showToast("✅ PLAN ELIMINADO", 'success');
          if (UI && typeof UI.guardarEstado === 'function') UI.guardarEstado();
        },
        
        getRitmoPorZona(z) { 
          if (!AppState.lastRitmoBase) return "Calcula zonas primero"; 
          
          const f = { 'Z1': 1.35, 'Z2': 1.25, 'Z3': 1.15, 'Z4': 1.05, 'Z5': 0.95, 'Z6': 0.85 }; 
          
          if (z.includes('-')) { 
            const [a, b] = z.split('-'); 
            return `${Utils.formatR(AppState.lastRitmoBase * (f[a] || 1.15))} – ${Utils.formatR(AppState.lastRitmoBase * (f[b] || 1.05))} min/km`; 
          } 
          
          return Utils.formatR(AppState.lastRitmoBase * (f[z] || 1.15)) + " min/km"; 
        },
        
        validarOpcionesPlan() {
          const duracion = document.getElementById('duracionPlan')?.value || '1';
          const experiencia = document.getElementById('experienciaDistancia')?.value || 'no';
          const distSelect = document.getElementById('distObjetivo');
          const infoDiv = document.getElementById('info-mensaje-distancia');
          const generarBtn = document.getElementById('generarPlanBtn');
          
          if (!distSelect || !infoDiv || !generarBtn) return;
          
          const opciones = distSelect.options;
          
          let mostrarMensaje = false;
          let habilitarBtn = true;
          
          for (let i = 0; i < opciones.length; i++) {
            if (opciones[i].value === 'medio' || opciones[i].value === 'maraton') {
              if (duracion === '12') {
                opciones[i].disabled = false;
              } else if (duracion === '3' && experiencia === 'si') {
                opciones[i].disabled = false;
              } else {
                opciones[i].disabled = true;
                if (distSelect.value === opciones[i].value) {
                  distSelect.value = '10k';
                }
                mostrarMensaje = true;
                habilitarBtn = false;
              }
            } else {
              opciones[i].disabled = false;
            }
          }
          
          infoDiv.style.display = mostrarMensaje ? 'block' : 'none';
          generarBtn.disabled = !habilitarBtn;
        },
        
        generarCalendarioEntreno() {
          if (!AppState.zonasCalculadas) { 
            Utils.showToast("> PRIMERO CALCULA TUS ZONAS_", 'error'); 
            return; 
          }
          if (!AppState.isPremium) {
            Utils.showToast("> SOLO USUARIOS PREMIUM PUEDEN GENERAR PLANES_", 'error');
            return;
          }
          
          const distancia = document.getElementById("distObjetivo")?.value || '10k';
          const duracion = parseInt(document.getElementById("duracionPlan")?.value || '1');
          const experiencia = document.getElementById("experienciaDistancia")?.value || 'no';
          
          if (distancia === 'medio' || distancia === 'maraton') {
            if (!(duracion === 12 || (duracion === 3 && experiencia === 'si'))) {
              Utils.showToast("❌ Los planes de Media Maratón y Maratón requieren 12 meses o 3 meses con experiencia.", 'error');
              return;
            }
          }
          
          setTimeout(() => {
            try {
              const modalidad = document.getElementById("modalidad")?.value || 'runner';
              const meses = duracion;
              const nivel = document.getElementById("nivel")?.value || 'intermedio';
              const exp = experiencia;
              const obj = document.getElementById("objetivoPrincipal")?.value || 'mejorar';
              const diaLargo = parseInt(document.getElementById("diaLargo")?.value || '7');
              const fechaInicio = document.getElementById("fechaInicio")?.value;
              
              if (!fechaInicio) { 
                Utils.showToast("> SELECCIONA UNA FECHA DE INICIO_", 'error'); 
                return; 
              }
              
              const diasEntreno = [];
              for (let i = 1; i <= 7; i++) { 
                const cb = document.getElementById(`dia${i}`); 
                if (cb && cb.checked) diasEntreno.push(i); 
              }
              
              if (diasEntreno.length === 0) { 
                Utils.showToast("> SELECCIONA AL MENOS UN DÍA DE ENTRENO_", 'error'); 
                return; 
              }
              
              if (!diasEntreno.includes(diaLargo)) {
                if (confirm("> El día de tirada larga no está seleccionado. ¿Añadirlo automáticamente?")) {
                  diasEntreno.push(diaLargo); 
                  const largoCheckbox = document.getElementById(`dia${diaLargo}`);
                  if (largoCheckbox) largoCheckbox.checked = true;
                } else { 
                  return; 
                }
              }
              
              diasEntreno.sort((a, b) => a - b);
              
              const fecha = new Date(fechaInicio + "T00:00:00");
              const macrociclo = meses * 4;
              const mapa = { "2k": "2 km", "5k": "5 km", "10k": "10 km", "medio": "MEDIA", "maraton": "MARATÓN" };
              const diaNombre = ["", "LUN", "MAR", "MIÉ", "JUE", "VIE", "SÁB", "DOM"][diaLargo];
              
              const resumenEl = document.getElementById("resumenObjetivo");
              if (resumenEl) {
                resumenEl.innerText = `${mapa[distancia]} · ${diasEntreno.length} DÍAS/SEM · ${nivel.toUpperCase()} · ${exp === 'si' ? 'CON EXPERIENCIA' : 'PRIMERA VEZ'} · OBJ: ${obj === 'acabar' ? 'TERMINAR' : obj === 'mejorar' ? 'MEJORAR' : 'COMPETIR'} · LARGO: ${diaNombre} · ${modalidad === 'runner' ? 'ASFALTO' : 'MONTAÑA'} · ${meses} MES(ES) · INICIO: ${fecha.toLocaleDateString()}`;
              }
              
              // Generar sesiones (versión simplificada)
              const totalDias = macrociclo * 7;
              const sesiones = [];
              
              for (let dia = 1; dia <= totalDias; dia++) {
                const semana = Math.floor((dia - 1) / 7);
                const diaSem = (dia - 1) % 7 + 1;
                let color = "sesion-descanso", breve = "D", detalle = null;
                
                if (diasEntreno.includes(diaSem)) {
                  let tipo = 'rodaje';
                  if (diaSem === diaLargo) {
                    tipo = 'largo';
                  }
                  
                  if (tipo === 'largo') { color = "sesion-largo"; breve = "L"; }
                  else if (tipo === 'series') { color = "sesion-series"; breve = "S"; }
                  else if (tipo === 'tempo') { color = "sesion-tempo"; breve = "T"; }
                  else { color = "sesion-rodaje"; breve = "R"; }
                  
                  // Datos de ejemplo para el detalle
                  detalle = {
                    nombre: tipo === 'largo' ? 'Tirada larga' : tipo === 'series' ? 'Series' : tipo === 'tempo' ? 'Tempo' : 'Rodaje',
                    duracion: tipo === 'largo' ? 60 : tipo === 'series' ? 45 : 40,
                    unidad: 'min',
                    zona: tipo === 'largo' ? 'Z2' : tipo === 'series' ? 'Z4' : 'Z3',
                    estructura: 'Calentamiento + trabajo principal + enfriamiento',
                    desc: 'Sesión de entrenamiento',
                    tipo: tipo
                  };
                }
                
                sesiones.push({ color, breve, detalle, semana: semana + 1 });
              }
              
              const planId = Date.now().toString();
              const planCompleto = {
                params: { modalidad, distancia, macrociclo, diasPorSemana: diasEntreno.length, nivel, experiencia: exp, objetivo: obj, diaLargo, fechaInicio, diasEntreno },
                sesiones: sesiones,
                resumen: resumenEl ? resumenEl.innerText : '',
                realizadas: {}
              };
              
              AppState.planGeneradoActual = planCompleto.params;
              AppState.planActualId = planId;
              AppState.sesionesRealizadas = {};
              AppState.trimestreActual = 0;
              
              const calendario = document.getElementById("calendarioEntreno");
              if (calendario) calendario.style.display = "block";
              
              const cuestionario = document.getElementById("cuestionarioEntreno");
              if (cuestionario) cuestionario.style.display = "none";
              
              if (UI && typeof UI.mostrarCalendario === 'function') {
                UI.mostrarCalendario(sesiones);
              }
              
              this.guardarPlanActual();
              if (UI && typeof UI.guardarPlanEnHistorial === 'function') {
                UI.guardarPlanEnHistorial(planCompleto.params, planCompleto);
              }
              if (UI && typeof UI.guardarEstado === 'function') UI.guardarEstado();
              
              Utils.vibrate(50);
              Utils.playSound('success');
              Utils.showToast('✅ Plan generado', 'success');
            } catch (e) { 
              console.error(e); 
              Utils.showToast("> ERROR GENERANDO PLAN_", 'error'); 
            }
          }, 300);
        }
      };

      // Asignar función de validación
      window.validarOpcionesPlan = PlanGenerator.validarOpcionesPlan.bind(PlanGenerator);

      // ==================== MÓDULO PWA ====================
      const PWA = {
        deferredPrompt: null,
        
        init() {
          window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            this.deferredPrompt = e;
            if (localStorage.getItem('pwa_installed') !== 'true') {
              const banner = document.getElementById('pwa-banner');
              if (banner) banner.style.display = 'flex';
            }
          });
          
          window.addEventListener('appinstalled', () => {
            const banner = document.getElementById('pwa-banner');
            if (banner) banner.style.display = 'none';
            this.deferredPrompt = null;
            localStorage.setItem('pwa_installed', 'true');
          });
        },
        
        instalarPWA() {
          if (!this.deferredPrompt) { 
            Utils.showToast('Para instalar: menú del navegador → "Añadir a pantalla de inicio"', 'info'); 
            return; 
          }
          
          this.deferredPrompt.prompt();
          this.deferredPrompt.userChoice.then(c => { 
            if (c.outcome === 'accepted') {
              localStorage.setItem('pwa_installed', 'true');
            }
            this.deferredPrompt = null; 
            const banner = document.getElementById('pwa-banner');
            if (banner) banner.style.display = 'none'; 
          });
        },
        
        cerrarBannerPWA() { 
          const banner = document.getElementById('pwa-banner');
          if (banner) banner.style.display = 'none'; 
        },
        
        registerServiceWorker() { 
          if ('serviceWorker' in navigator) { 
            const sw = `const CACHE='ri5-cache-v1'; const urls=['.','https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js']; self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(urls)))); self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))); self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.map(k=>k!==CACHE?caches.delete(k):null)))));`; 
            const b = new Blob([sw], { type: 'application/javascript' }); 
            navigator.serviceWorker.register(URL.createObjectURL(b)).catch(console.log); 
          } 
        }
      };

      // ==================== MÓDULO DE TEMA ====================
      const ThemeManager = {
        init() {
          const savedTheme = localStorage.getItem('ri5_theme');
          if (savedTheme === 'light' || savedTheme === 'dark') {
            document.body.classList.add(`manual-${savedTheme}`);
          }
          this.updateButton();
        },
        
        toggle() {
          if (document.body.classList.contains('manual-light')) {
            document.body.classList.remove('manual-light');
            document.body.classList.add('manual-dark');
            localStorage.setItem('ri5_theme', 'dark');
          } else if (document.body.classList.contains('manual-dark')) {
            document.body.classList.remove('manual-dark');
            localStorage.setItem('ri5_theme', 'light');
          } else {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (isDark) {
              document.body.classList.add('manual-light');
              localStorage.setItem('ri5_theme', 'light');
            } else {
              document.body.classList.add('manual-dark');
              localStorage.setItem('ri5_theme', 'dark');
            }
          }
          this.updateButton();
        },
        
        updateButton() {
          const btns = document.querySelectorAll('.theme-toggle');
          btns.forEach(btn => {
            if (document.body.classList.contains('manual-light')) {
              btn.innerText = '🌙';
            } else if (document.body.classList.contains('manual-dark')) {
              btn.innerText = '☀️';
            } else {
              btn.innerText = '🌓';
            }
          });
        }
      };

      window.toggleTheme = () => ThemeManager.toggle();

      // ==================== FUNCIONES GLOBALES ====================
      window.switchAuthTab = (tab) => Auth.switchAuthTab(tab);
      window.registerUser = () => Auth.registerUser();
      window.loginUser = () => Auth.loginUser();
      window.logoutUser = () => Auth.logoutUser();
      window.logoutAdmin = () => Auth.logoutAdmin();
      window.startCalc = () => Training.startCalc();
      window.copyResults = () => Training.copyResults();
      window.shareResults = () => Training.shareResults();
      window.switchTab = (tab) => UI.switchTab(tab);
      window.changeDailyTip = () => UI.changeDailyTip();
      window.changeConsejo = () => UI.changeConsejo();
      window.toggleHistorialDetalle = (el) => UI.toggleHistorialDetalle(el);
      window.borrarEntradaHistorial = (i) => UI.borrarEntradaHistorial(i);
      window.borrarHistorial = () => UI.borrarHistorial();
      window.toggleCuestionario = () => PlanGenerator.toggleCuestionario();
      window.mostrarUltimoPlanGuardado = () => PlanGenerator.mostrarUltimoPlanGuardado();
      window.borrarPlanGuardado = () => PlanGenerator.borrarPlanGuardado();
      window.generarCalendarioEntreno = () => PlanGenerator.generarCalendarioEntreno();
      window.cargarPlanDesdeHistorial = (id) => UI.cargarPlanDesdeHistorial(id);
      window.eliminarPlanHistorial = (id) => UI.eliminarPlanHistorial(id);
      window.cambiarTrimestre = (delta) => UI.cambiarTrimestre(delta);
      window.cerrarPlan = () => UI.cerrarPlan();
      window.cambiarSoporteTab = (tab) => UI.cambiarSoporteTab(tab);
      window.enviarMensajeUsuario = () => UI.enviarMensajeUsuario();
      window.borrarMensajeUsuario = (id) => UI.borrarMensajeUsuario(id);
      window.toggleMensajeRecibido = (h, id) => UI.toggleMensajeRecibido(h, id);
      window.instalarPWA = () => PWA.instalarPWA();
      window.cerrarBannerPWA = () => PWA.cerrarBannerPWA();
      window.cerrarModalSesion = () => UI.cerrarModalSesion();
      
      // Funciones de bienvenida y modales
      window.cerrarWelcomeModal = async function() {
        const overlay = document.getElementById('welcomeOverlay');
        const modal = document.getElementById('welcomeModal');
        if (overlay) overlay.style.display = 'none';
        if (modal) modal.style.display = 'none';
        
        if (AppState.currentUid && AppState.currentUserData) {
          await Storage.updateUser(AppState.currentUid, { welcomeSeen: true });
          if (AppState.currentUserData) {
            AppState.currentUserData.welcomeSeen = true;
          }
        }
      };

      // ==================== INICIALIZACIÓN ====================
      document.addEventListener("DOMContentLoaded", async () => {
        console.log('🚀 Inicializando RI5...');
        
        // Configurar event listeners
        const ageInput = document.getElementById("age");
        if (ageInput) {
          ageInput.addEventListener("blur", () => UI.marcarCampoTocado('age'));
          ageInput.addEventListener("input", () => { 
            if (AppState.camposTocados.age) UI.validarCampo('age'); 
            UI.validarTodo(); 
          });
        }
        
        const timeInput = document.getElementById("time");
        if (timeInput) {
          timeInput.addEventListener("blur", () => UI.marcarCampoTocado('time'));
          timeInput.addEventListener("input", () => { 
            if (AppState.camposTocados.time) UI.validarCampo('time'); 
            UI.validarTodo(); 
          });
        }
        
        UI.validarTodo();
        UI.initDiasCheckboxes();
        UI.setFechaActual();

        // Configurar validación de plan
        const duracionPlan = document.getElementById('duracionPlan');
        if (duracionPlan) {
          duracionPlan.addEventListener('change', PlanGenerator.validarOpcionesPlan.bind(PlanGenerator));
        }
        
        const experienciaDistancia = document.getElementById('experienciaDistancia');
        if (experienciaDistancia) {
          experienciaDistancia.addEventListener('change', PlanGenerator.validarOpcionesPlan.bind(PlanGenerator));
        }
        
        PlanGenerator.validarOpcionesPlan();

        // Verificar sesión guardada
        if (!await Auth.checkSavedSession()) {
          const loginPage = document.getElementById("loginPage");
          if (loginPage) loginPage.style.display = "flex";
        }

        // PWA
        if (localStorage.getItem('pwa_installed') === 'true') {
          const pwaBanner = document.getElementById('pwa-banner');
          if (pwaBanner) pwaBanner.style.display = 'none';
        }
        
        PWA.init(); 
        PWA.registerServiceWorker();
        
        setTimeout(() => { 
          if (PWA.deferredPrompt && localStorage.getItem('pwa_installed') !== 'true') {
            const pwaBanner = document.getElementById('pwa-banner');
            if (pwaBanner) pwaBanner.style.display = 'flex'; 
          }
        }, 3000);
        
        ThemeManager.init();
        
        // Habilitar audio con el primer clic
        document.addEventListener('click', function enableAudio() {
          window.audioEnabled = true;
          document.removeEventListener('click', enableAudio);
        }, { once: true });
        
        console.log('✅ RI5 inicializado correctamente');
      });
    })();
  </script>
</body>
</html>
